name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish jzon_derive
        run: cargo publish -p jzon_derive --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Wait for crates.io to index jzon_derive before publishing dependents
      - name: Wait for jzon_derive to be indexed
        run: sleep 30

      - name: Publish jzon
        run: cargo publish -p jzon --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for jzon to be indexed
        run: sleep 30

      - name: Publish jzon_serde
        run: cargo publish -p jzon_serde --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for jzon_serde to be indexed
        run: sleep 30

      - name: Publish jzon_compat
        run: cargo publish -p jzon_compat --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
